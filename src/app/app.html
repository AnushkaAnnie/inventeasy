<div class="app-layout" [class.sidebar-collapsed]="sidenavCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidenavCollapsed" *ngIf="sidenavOpened">
    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-logo">
        <span>IE</span>
      </div>
      <span class="brand-name" *ngIf="!sidenavCollapsed">InventEasy</span>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item"
        [matTooltip]="sidenavCollapsed ? 'Dashboard' : ''" matTooltipPosition="right">
        <mat-icon>dashboard</mat-icon>
        <span class="nav-label" *ngIf="!sidenavCollapsed">Dashboard</span>
      </a>
      <a routerLink="/products" routerLinkActive="active" class="nav-item"
        [matTooltip]="sidenavCollapsed ? 'Products' : ''" matTooltipPosition="right">
        <mat-icon>inventory_2</mat-icon>
        <span class="nav-label" *ngIf="!sidenavCollapsed">Products</span>
      </a>
      <a routerLink="/suppliers" routerLinkActive="active" class="nav-item"
        [matTooltip]="sidenavCollapsed ? 'Suppliers' : ''" matTooltipPosition="right">
        <mat-icon>business</mat-icon>
        <span class="nav-label" *ngIf="!sidenavCollapsed">Suppliers</span>
      </a>
      <a routerLink="/orders" routerLinkActive="active" class="nav-item" [matTooltip]="sidenavCollapsed ? 'Orders' : ''"
        matTooltipPosition="right">
        <mat-icon>receipt_long</mat-icon>
        <span class="nav-label" *ngIf="!sidenavCollapsed">Orders</span>
      </a>
      <a routerLink="/analytics" routerLinkActive="active" class="nav-item"
        [matTooltip]="sidenavCollapsed ? 'Analytics' : ''" matTooltipPosition="right">
        <mat-icon>analytics</mat-icon>
        <span class="nav-label" *ngIf="!sidenavCollapsed">Analytics</span>
      </a>

      <div class="nav-divider"></div>

      <!-- Dark Mode Toggle -->
      <button class="nav-item toggle-btn" (click)="toggleDarkMode()"
        [matTooltip]="sidenavCollapsed ? (isDarkMode ? 'Light Mode' : 'Dark Mode') : ''" matTooltipPosition="right">
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span class="nav-label" *ngIf="!sidenavCollapsed">{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</span>
      </button>
    </nav>

    <!-- Collapse Toggle -->
    <button class="collapse-btn" (click)="toggleCollapse()">
      <mat-icon>{{ sidenavCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
    </button>

    <!-- User Info -->
    <div class="sidebar-footer" *ngIf="!sidenavCollapsed">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div class="user-details">
          <p class="user-name">Admin User</p>
          <p class="user-role">Administrator</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="topbar">
      <button class="menu-btn" (click)="toggleSidenav()">
        <mat-icon>{{ sidenavOpened ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
      <div class="topbar-spacer"></div>
      <span class="topbar-subtitle">Inventory Management</span>
    </header>

    <!-- Page Content -->
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Floating Quick Action Dock (global, viewport-centered) -->
  <nav class="global-dock">
    <div class="dock-inner">
      <a routerLink="/products" class="dock-btn" matTooltip="Products" matTooltipPosition="above">
        <mat-icon>add_box</mat-icon>
      </a>
      <a routerLink="/orders" class="dock-btn" matTooltip="Orders" matTooltipPosition="above">
        <mat-icon>receipt_long</mat-icon>
      </a>
      <a routerLink="/suppliers" class="dock-btn" matTooltip="Suppliers" matTooltipPosition="above">
        <mat-icon>group_add</mat-icon>
      </a>
      <span class="dock-separator"></span>
      <a routerLink="/products" class="dock-btn" matTooltip="Inventory" matTooltipPosition="above">
        <mat-icon>inventory</mat-icon>
      </a>
      <a routerLink="/analytics" class="dock-btn dock-btn-warn" matTooltip="Low Stock Alerts"
        matTooltipPosition="above">
        <mat-icon>warning_amber</mat-icon>
      </a>
      <a routerLink="/analytics" class="dock-btn" matTooltip="Analytics" matTooltipPosition="above">
        <mat-icon>analytics</mat-icon>
      </a>
    </div>
  </nav>
</div>
